; Godot 4 Export Presets
; Generated for godot-vrt platform VRT testing
;
; 各プラットフォームのビルドには対応するエクスポートテンプレートが必要。
; Godot エディタで「Editor > Export...」から設定を確認・調整すること。

[preset.0]

name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="exports/web/index.html"
script_export_mode=1
patches=PackedStringArray()

