name: VRT

on:
  pull_request:

jobs:
  capture-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan software renderer
        run: sudo apt-get install -y mesa-vulkan-drivers

      - name: Download latest Godot
        run: |
          RELEASE_TAG=$(curl -s "https://api.github.com/repos/godotengine/godot/releases/latest" | jq -r '.tag_name')
          FILENAME="Godot_v${RELEASE_TAG}_linux.x86_64"
          echo "Downloading Godot ${RELEASE_TAG}..."
          wget -q "https://github.com/godotengine/godot/releases/download/${RELEASE_TAG}/${FILENAME}.zip"
          unzip -q "${FILENAME}.zip"
          mv "${FILENAME}" godot
          chmod +x godot

      - name: Capture screenshots
        run: |
          ./godot --headless --rendering-driver vulkan --path "$PWD/tests" --script "$PWD/capture.gd"

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm ci

      - name: Upload screenshots to Argos
        run: npm exec -- argos upload --token ${{ secrets.ARGOS_TOKEN }} ./tests/vr_screenshots
