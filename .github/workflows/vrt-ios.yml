name: VRT - iOS

# NOTE: iOS ビルドには macOS ランナーが必要。
# macOS ランナーは課金対象のため、手動トリガーとスケジュール実行のみに限定することを推奨。
on:
  workflow_dispatch:
  schedule:
    # 毎週月曜 9:00 JST (= 0:00 UTC)
    - cron: "0 0 * * 1"

jobs:
  build-and-capture:
    runs-on: macos-14   # Apple Silicon (M1) ランナー

    env:
      BUNDLE_ID: com.example.godot-vrt-tests
      SIMULATOR_NAME: "iPhone 15"
      SIMULATOR_RUNTIME: "iOS-17-0"

    steps:
      - uses: actions/checkout@v4

      # ── Xcode のセットアップ ─────────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      # ── Godot のセットアップ ─────────────────────────────────────────────
      - name: Download Godot (macOS)
        run: |
          RELEASE_TAG=$(curl -s "https://api.github.com/repos/godotengine/godot/releases/latest" \
            | jq -r '.tag_name')
          FILENAME="Godot_v${RELEASE_TAG}_macos.universal"
          echo "Downloading Godot ${RELEASE_TAG}..."
          wget -q "https://github.com/godotengine/godot/releases/download/${RELEASE_TAG}/${FILENAME}.zip"
          unzip -q "${FILENAME}.zip"
          # macOS 版は Godot.app として展開される
          GODOT_BIN="Godot.app/Contents/MacOS/Godot"
          chmod +x "$GODOT_BIN"
          echo "GODOT=$PWD/$GODOT_BIN" >> "$GITHUB_ENV"

      - name: Download iOS export templates
        run: |
          RELEASE_TAG=$("$GODOT" --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          TEMPLATE_URL="https://github.com/godotengine/godot/releases/download/${RELEASE_TAG}-stable/Godot_v${RELEASE_TAG}-stable_export_templates.tpz"
          echo "Downloading export templates..."
          wget -q "$TEMPLATE_URL" -O templates.tpz
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${RELEASE_TAG}.stable"
          mkdir -p "$TEMPLATES_DIR"
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TEMPLATES_DIR/"

      # ── iOS .xcodeproj のエクスポート ─────────────────────────────────────
      - name: Export to iOS
        run: |
          mkdir -p exports/ios
          "$GODOT" --headless --path "$PWD/tests" \
            --export-debug iOS "$PWD/exports/ios/godot_vrt_tests.xcodeproj"

      # ── Simulator ビルド ──────────────────────────────────────────────────
      - name: Build for Simulator
        run: |
          xcodebuild \
            -project exports/ios/godot_vrt_tests.xcodeproj \
            -scheme godot_vrt_tests \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath exports/ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      # ── Simulator の起動 ──────────────────────────────────────────────────
      - name: Boot Simulator
        run: |
          UDID=$(xcrun simctl list devices available | \
            grep "$SIMULATOR_NAME" | \
            grep -oE '[0-9A-F-]{36}' | head -1)
          if [ -z "$UDID" ]; then
            echo "Simulator '${SIMULATOR_NAME}' not found. Creating one..."
            UDID=$(xcrun simctl create vrt_device \
              "com.apple.CoreSimulator.SimDeviceType.iPhone-15" \
              "com.apple.CoreSimulator.SimRuntime.${SIMULATOR_RUNTIME}")
          fi
          echo "SIMULATOR_UDID=${UDID}" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          xcrun simctl list devices | grep Booted

      # ── アプリのインストールと設定 ────────────────────────────────────────
      - name: Install app in Simulator
        run: |
          APP_PATH="exports/ios/build/Build/Products/Debug-iphonesimulator/godot_vrt_tests.app"
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Configure VRT (all scenes)
        run: |
          APP_DATA=$(xcrun simctl get_app_container "$SIMULATOR_UDID" "$BUNDLE_ID" data)
          DOCS_DIR="${APP_DATA}/Documents"
          mkdir -p "${DOCS_DIR}/vr_screenshots"
          echo "DOCS_DIR=${DOCS_DIR}" >> "$GITHUB_ENV"
          # 特定シーンのみキャプチャする場合:
          # echo '{"scenes":["res://ios_ui_test.tscn"]}' > "${DOCS_DIR}/vrt_config.json"

      # ── アプリ起動と完了待機 ──────────────────────────────────────────────
      - name: Launch app
        run: xcrun simctl launch "$SIMULATOR_UDID" "$BUNDLE_ID"

      - name: Wait for VRT completion
        run: |
          DONE="${DOCS_DIR}/vrt_done"
          for i in $(seq 1 90); do
            if [ -f "$DONE" ]; then
              echo "VRT complete."
              exit 0
            fi
            echo "Waiting... (${i}/90)"
            sleep 2
          done
          echo "Timeout waiting for VRT completion."
          exit 1

      # ── スクリーンショットの回収 ──────────────────────────────────────────
      - name: Collect screenshots
        run: |
          mkdir -p tests/vr_screenshots
          cp "${DOCS_DIR}/vr_screenshots/"*.png tests/vr_screenshots/ 2>/dev/null || true
          echo "Collected $(ls tests/vr_screenshots/*.png 2>/dev/null | wc -l) screenshots."

      # ── Node.js + Argos ──────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm ci

      - name: Upload screenshots to Argos
        run: |
          npm exec -- argos upload \
            --token ${{ secrets.ARGOS_TOKEN }} \
            --build-name ios \
            ./tests/vr_screenshots

      # ── アーティファクトとして保存（任意） ───────────────────────────────
      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-screenshots-ios
          path: tests/vr_screenshots/
          retention-days: 7
